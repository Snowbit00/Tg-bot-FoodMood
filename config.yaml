# ── Конфигурация автоматизированного канала «Рецепты» ───────────────────────
# Секреты (ключи, токены) — в файле .env, НЕ здесь.

# ── Текст рецептов: любой OpenAI-совместимый чат-эндпоинт ────────────────────
# По умолчанию — ПРЯМОЙ API DeepSeek (ваш ключ DEEPSEEK_API_KEY).
text_api:
  base_url: https://api.1bitai.ru/v1/chat/completions
  model: deepseek-v4-flash-thinking
  auth: bearer
  api_key_env: DEEPSEEK_API_KEY   # здесь лежит ваш ключ 1bitai (имя переменной историческое)
temperature: 0.7
# Модели «с размышлением» (…-thinking) тратят токены на рассуждения ДО ответа,
# поэтому лимит большой — иначе JSON-рецепт обрывается. Это лишь потолок, а не расход.
max_tokens: 8000

# ── Картинки ────────────────────────────────────────────────────────────────
# Провайдер генерации изображения блюда:
#   kandinsky — FusionBrain API (Sber), РФ-доступ, бесплатно/дёшево  → .env: FUSIONBRAIN_API_KEY, FUSIONBRAIN_SECRET_KEY
#   yandexart — YandexART (Foundation Models), оплата в рублях       → .env: YANDEX_API_KEY, YANDEX_FOLDER_ID
#   openai    — gpt-image-1 (нужна зарубежная оплата)                → .env: OPENAI_API_KEY  (+ pip install openai)
#   none      — без картинки (пост уйдёт текстом)
image_provider: yandexart
image_size: 1024            # сторона квадратной картинки, px

# Если генерация картинки не удалась на боевом запуске:
#   true  — пост отменяется (не публиковать «как есть»)
#   false — публиковать текстом без фото
require_image: true

# ── Контент-план: рубрики по времени суток ──────────────────────────────────
# Скрипт смотрит на текущий час и берёт случайную рубрику из подходящего слота.
# from — включительно, to — исключительно (часы 0–23, местное время).
rubric_by_hour:
  - {from: 5,  to: 11, rubrics: [завтраки, выпечка, запеканки, сырники, омлеты]}
  - {from: 11, to: 16, rubrics: [супы, салаты, вторые блюда, гарниры, горячее]}
  - {from: 16, to: 24, rubrics: [ужины, горячее, десерты, торты, закуски]}
default_rubrics: [домашние блюда]      # на случай ночного/непокрытого часа

# Справочно (реальное расписание задаёт Планировщик Windows, см. setup_schedule.ps1):
posts_per_day: 3
post_times: ["09:00", "14:00", "19:00"]

# ── Рост и вовлечение ───────────────────────────────────────────────────────
# Ник канала для кнопок и вотермарки. Пусто = взять из @username в TELEGRAM_CHANNEL_ID.
channel_username: ""
buttons: true                                  # inline-кнопки «Подписаться»/«Поделиться» под постом
share_text: "Вкусные рецепты каждый день 🍳"   # текст при нажатии «Поделиться»
watermark: true                                # наносить @ник канала на фото
cta_text: "📌 Сохрани рецепт · 📤 Поделись с другом"   # призыв в конце поста (пусто = без CTA)

# Опросы-вовлечение (режим --poll). Опции = приёмы пищи; голоса учитываются при
# генерации рецептов (агрегат + акцент на слоте-победителе). Завтрак→09:00, Обед→14:00, Ужин→19:00.
polls:
  - question: "Что приготовить в ближайшие дни? Голосуйте — по итогам выйдут рецепты!"
    options: [Завтрак, Обед, Ужин]
  - question: "Какой приём пищи сейчас в приоритете?"
    options: [Завтрак, Обед, Ужин]
# Справочно: опрос ставится отдельной задачей RecipesPoll (вс 12:00, см. setup_schedule.ps1).
